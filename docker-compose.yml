version: '3.9'

services:

  db:
    image: mariadb:11
    container_name: jtrack-db
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-jtrackdb}
      MYSQL_USER: ${DB_USER:-jtrackuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jtrackpassword}
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: jtrack-dashboard:${IMAGE_TAG:-latest}
    container_name: jtrack-web
    restart: unless-stopped
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/mediafiles
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      ALLOWED_HOSTS: "*"
      DEBUG: "False"
    depends_on:
      - db
    expose:
      - "8000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: jtrack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - staticfiles:/app/staticfiles:ro
      - mediafiles:/app/mediafiles:ro
    depends_on:
      - web

volumes:
  db_data:
  staticfiles:
  mediafiles:
